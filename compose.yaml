services:
  
  cusho:
    image: cusho
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
    networks:
      - backend

  postgres:
    image: postgres:latest
    container_name: cusho_dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: cusho_dev
    ports:
      - "5555:5432"
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/seed.sql
      - data_sql:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d cusho_dev -h localhost -p 5432" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    networks:
      - backend

volumes:
  data_sql:

networks:
  backend:
    driver: bridge
    